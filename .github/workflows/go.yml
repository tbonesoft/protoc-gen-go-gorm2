# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        go-version: ["1.20", "1.24"]

    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1.46.0
        with:
          version: 1.46.0

      - name: Generate code for protoc-gen-go-gorm2
        run: buf generate

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build bookstore
        run: |
          go install -v github.com/tbonesoft/protoc-gen-go-gorm2/cmd/protoc-gen-go-gorm2
          buf generate --template buf.gen.bookstore.yaml

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
